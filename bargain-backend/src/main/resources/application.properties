# Bargain Here Spring Boot Configuration
server.port=5000

# Enable serving of static content
spring.resources.static-locations=classpath:/static/

# JSP View Resolver Mapping
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# MySQL Database DataSource configuration
spring.datasource.url=jdbc:mysql://localhost:3306/bargain_here?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Logging levels
logging.level.org.springframework.web=INFO
logging.level.com.bargain=INFO
